<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTA Generator — Fernandes Labs</title>
  <meta name="description" content="Generate call-to-action button text. Runs entirely in your browser — no data sent to servers.">
  <link rel="canonical" href="https://fernandeslabs.com/tools/seo/cta-generator/">
  <meta property="og:title" content="CTA Generator — Fernandes Labs">
  <meta property="og:description" content="Generate call-to-action button text.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CTA Generator — Fernandes Labs">
  <meta name="twitter:description" content="Generate call-to-action button text.">
  <link rel="icon" href="../../../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../../assets/styles.css">
  <script src="../../../assets/config-loader.js"></script>
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"CTA Generator","description":"Generate call-to-action button text.","applicationCategory":"Utilities","operatingSystem":"All","url":"https://fernandeslabs.com/tools/seo/cta-generator/"}
  </script>
</head>
<body>
<header class="fl-header">
  <div class="fl-container fl-header-inner">
    <a href="../../../" class="fl-brand"><img src="../../../assets/logo.svg" alt="Fernandes Labs" class="fl-brand-logo"><span>Fernandes Labs</span></a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </div>
</header>
<main>
  <section class="fl-hero fl-container">
    <h1>CTA Generator</h1>
    <p>Generate call-to-action button text.</p>
  </section>
  <section class="fl-container fl-section">
    <div class="ad-placeholder">Advertisement</div>
    <div class="card">
<label for="topic">What is your product/action?</label>
      <input class="input" id="topic" value="newsletter signup">
      <button class="btn btn-primary" id="btn-go" style="margin-top:var(--space-3);">Generate CTAs</button>
      <div id="result" style="margin-top:var(--space-4);"></div>
    </div>
    <div class="ad-placeholder">Advertisement</div>
  </section>
</main>
<footer class="fl-footer">
  <div class="fl-container fl-footer-inner">
    <a href="../../../">← Back to Tools</a>
    <p id="footer-text">Built by Fernandes Labs</p>
  </div>
</footer>
<script>
var t=document.getElementById("theme-toggle"),s=localStorage.getItem("fl-theme")||"light";
document.documentElement.setAttribute("data-theme",s);
t.textContent=s==="dark"?"☀️":"🌙";
t.addEventListener("click",function(){var n=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",n);localStorage.setItem("fl-theme",n);t.textContent=n==="dark"?"☀️":"🌙";});
FernandesConfig.load().then(function(c){document.getElementById("footer-text").textContent=c.branding.footer_text;});
document.getElementById("btn-go").addEventListener("click",function(){
  var t=document.getElementById("topic").value;var ctas=[
  "Get Started with "+t,"Try "+t+" Free","Join "+t+" Now","Sign Up for "+t,
  "Start Your "+t,"Get "+t+" Today","Don't Miss "+t,"Claim Your "+t,
  "Subscribe to "+t,"Unlock "+t
  ];
  var html=ctas.map(function(c){return"<button class='btn btn-secondary' style='margin:var(--space-1);' data-copy='"+c.replace(/'/g,"\\'")+"'>"+c+"</button>"}).join("");
  document.getElementById("result").innerHTML=html;
  var btns=document.querySelectorAll("[data-copy]");btns.forEach(function(b){b.addEventListener("click",function(){navigator.clipboard.writeText(this.getAttribute("data-copy"))})});
});

</script>
</body>
</html>
