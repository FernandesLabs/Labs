  // Theme toggle
  var themeToggle = document.getElementById("theme-toggle");
  var savedTheme = localStorage.getItem("fl-theme");
  if (!savedTheme) {
    savedTheme = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  }
  document.documentElement.setAttribute("data-theme", savedTheme);
  themeToggle.textContent = savedTheme === "dark" ? "☀️" : "🌙";
  themeToggle.addEventListener("click", function () {
    var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("fl-theme", next);
    themeToggle.textContent = next === "dark" ? "☀️" : "🌙";
  });

  // Render tools grid
  var grid = document.getElementById("tools-grid");
  function renderTools(filter) {
    grid.innerHTML = "";
    var filtered = TOOLS.filter(function (t) {
      if (!filter) return true;
      var q = filter.toLowerCase();
      return t.name.toLowerCase().indexOf(q) > -1 || t.description.toLowerCase().indexOf(q) > -1 || t.category.indexOf(q) > -1;
    });
    filtered.forEach(function (tool) {
      var card = document.createElement("a");
      card.href = "/tools/" + tool.category + "/" + tool.slug + "/";
      card.className = "card";
      card.style.textDecoration = "none";
      card.style.color = "var(--color-text)";
      card.innerHTML =
        '<div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-2);">' +
        '<span style="font-size:1.5rem;font-weight:700;color:var(--color-accent);">' + tool.icon + '</span>' +
        '<strong style="font-size:var(--font-size-base);">' + tool.name + '</strong>' +
        '</div>' +
        '<p style="font-size:var(--font-size-sm);color:var(--color-text-muted);">' + tool.description + '</p>' +
        '<span class="badge" style="margin-top:var(--space-3);background:var(--color-surface);color:var(--color-text-muted);">' + tool.category + '</span>';
      grid.appendChild(card);
    });
  }
  renderTools();

  document.getElementById("tool-search").addEventListener("input", function (e) {
    renderTools(e.target.value);
  });

  // Load config and apply branding
  FernandesConfig.load().then(function (config) {
    document.getElementById("footer-text").textContent = config.branding.footer_text;
    if (config.monetization.affiliate.enabled) {
      var links = config.monetization.affiliate.links;
      var container = document.getElementById("footer-links");
      Object.keys(links).forEach(function (key) {
        var a = document.createElement("a");
        a.href = links[key];
        a.textContent = key.charAt(0).toUpperCase() + key.slice(1);
        a.target = "_blank";
        a.rel = "noopener";
        container.appendChild(a);
      });
    }
  });
</script>

</body>
</html>
