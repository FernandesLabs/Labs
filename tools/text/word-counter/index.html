<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter — Fernandes Labs</title>
  <meta name="description" content="Free online word counter. Count words, characters, sentences, and estimate reading time instantly.">
  <link rel="canonical" href="https://fernandeslabs.com/tools/text/word-counter/">
  <meta property="og:title" content="Word Counter — Fernandes Labs">
  <meta property="og:description" content="Free online word counter. Count words, characters, sentences, and reading time.">
  <link rel="icon" href="../../../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../../assets/styles.css">
  <script src="../../../assets/config-loader.js"></script>
</head>
<body>

<header class="fl-header">
  <div class="fl-container fl-header-inner">
    <a href="../../../" class="fl-brand"><img src="../../../assets/logo.svg" alt="Fernandes Labs" class="fl-brand-logo"><span>Fernandes Labs</span></a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </div>
</header>

<main>
  <section class="fl-hero fl-container">
    <h1>Word Counter</h1>
    <p>Count words, characters, sentences, and estimate reading time. Updates live as you type.</p>
  </section>

  <section class="fl-container fl-section">
    <div class="card">
      <label for="text-input">Your text</label>
      <textarea class="textarea" id="text-input" placeholder="Start typing or paste your text here..." style="min-height: 250px;"></textarea>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: var(--space-3); margin-top: var(--space-4);">
        <div class="card" style="text-align:center; padding: var(--space-4);">
          <div style="font-size: 1.75rem; font-weight: 700; color: var(--color-accent);" id="stat-words">0</div>
          <div style="font-size: var(--font-size-sm); color: var(--color-text-muted);">Words</div>
        </div>
        <div class="card" style="text-align:center; padding: var(--space-4);">
          <div style="font-size: 1.75rem; font-weight: 700; color: var(--color-accent);" id="stat-chars">0</div>
          <div style="font-size: var(--font-size-sm); color: var(--color-text-muted);">Characters</div>
        </div>
        <div class="card" style="text-align:center; padding: var(--space-4);">
          <div style="font-size: 1.75rem; font-weight: 700; color: var(--color-accent);" id="stat-sentences">0</div>
          <div style="font-size: var(--font-size-sm); color: var(--color-text-muted);">Sentences</div>
        </div>
        <div class="card" style="text-align:center; padding: var(--space-4);">
          <div style="font-size: 1.75rem; font-weight: 700; color: var(--color-accent);" id="stat-reading">0s</div>
          <div style="font-size: var(--font-size-sm); color: var(--color-text-muted);">Reading time</div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="fl-footer">
  <div class="fl-container fl-footer-inner">
    <a href="../../../">← Back to Tools</a>
    <p id="footer-text">Built by Fernandes Labs</p>
  </div>
</footer>

<script>
  var themeToggle = document.getElementById("theme-toggle");
  var savedTheme = localStorage.getItem("fl-theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  themeToggle.textContent = savedTheme === "dark" ? "☀️" : "🌙";
  themeToggle.addEventListener("click", function () {
    var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("fl-theme", next);
    themeToggle.textContent = next === "dark" ? "☀️" : "🌙";
  });

  var input = document.getElementById("text-input");

  function update() {
    var text = input.value;
    var words = text.trim() ? text.trim().split(/\s+/).length : 0;
    var chars = text.length;
    var sentences = text.trim() ? (text.match(/[.!?]+/g) || []).length || 1 : 0;
    var seconds = Math.ceil(words / 200 * 60); // 200 wpm
    var reading = seconds < 60 ? seconds + "s" : Math.floor(seconds / 60) + "m " + (seconds % 60) + "s";
    document.getElementById("stat-words").textContent = words;
    document.getElementById("stat-chars").textContent = chars;
    document.getElementById("stat-sentences").textContent = sentences;
    document.getElementById("stat-reading").textContent = reading;
  }

  input.addEventListener("input", update);
  update();

  FernandesConfig.load().then(function (config) {
    document.getElementById("footer-text").textContent = config.branding.footer_text;
  });
</script>

</body>
</html>
